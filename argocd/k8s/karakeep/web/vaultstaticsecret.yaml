apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: karakeep-secrets
  namespace: karakeep
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: default
  type: kv-v2
  mount: homelab/apps/kv-secret
  path: karakeep
  rolloutRestartTargets:
    - kind: Deployment
      name: karakeep
    - kind: Deployment
      name: meilisearch
  destination:
    create: true
    name: karakeep-secrets
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: karakeep-smtp-secret
  namespace: karakeep
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: default
  type: kv-v2
  mount: homelab/infra/kv-secret
  path: shared/notifications
  rolloutRestartTargets:
    - kind: Deployment
      name: karakeep
  destination:
    create: true
    name: karakeep-smtp-secret
    transformation:
      excludeRaw: true
      excludes:
        - ".*" 
      templates:
        SMTP_HOST:
          text: '{{ .Secrets.smtp_host }}'
        SMTP_PORT:
          text: '{{ .Secrets.smtp_port }}'
        SMTP_SECURE:
          text: 'false'
        SMTP_USER:
          text: '{{ .Secrets.smtp_username }}'
        SMTP_PASSWORD:
          text: '{{ .Secrets.smtp_password }}'
        SMTP_FROM:
          text: 'karakeep@{{ .Secrets.smtp_domain }}'
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: karakeep-llm-secret
  namespace: karakeep
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: default
  type: kv-v2
  mount: homelab/infra/kv-secret
  path: shared/llms
  rolloutRestartTargets:
    - kind: Deployment
      name: karakeep
  destination:
    create: true
    name: karakeep-llm-secret
    transformation:
      excludeRaw: true
      excludes:
        - ".*" 
      templates:
        OPENAI_BASE_URL:
          text: 'https://generativelanguage.googleapis.com/v1beta'
        OPENAI_API_KEY:
          text: '{{ .Secrets.gemini_api_key }}'
        INFERENCE_TEXT_MODEL:
          text: 'gemini-2.5-flash'
        INFERENCE_ENABLE_AUTO_TAGGING:
          text: 'true'
        INFERENCE_ENABLE_AUTO_SUMMARIZATION:
          text: 'true'
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: karakeep-oauth-secret
  namespace: karakeep
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: default
  type: kv-v2
  mount: homelab/infra/kv-secret
  path: platforms/oauth/karakeep
  rolloutRestartTargets:
    - kind: Deployment
      name: karakeep
  destination:
    create: true
    name: karakeep-oauth-secret
    transformation:
      excludeRaw: true
      excludes:
        - ".*" 
      templates:
        OAUTH_WELLKNOWN_URL:
          text: '{{ .Secrets.well_known_url }}'
        OAUTH_CLIENT_SECRET:
          text: '{{ .Secrets.client_secret }}'
        OAUTH_CLIENT_ID:
          text: '{{ .Secrets.client_id }}'
        OAUTH_PROVIDER_NAME:
          text: 'Authentik'
        OAUTH_AUTO_REDIRECT:
          text: 'true'