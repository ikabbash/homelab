apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: monitoring
data:
  alert-rules.yaml: |
    groups:

      - name: kubernetes-audit
        interval: 1m
        rules:
          - alert: KubernetesAuditRBACModification
            expr: |
              sum by (username, object_resource, object_name) (
                count_over_time(
                  {job="kubernetes/audit"}
                  | json
                  | objectRef_apiGroup = "rbac.authorization.k8s.io"
                  | verb =~ "create|update|patch|delete"
                  | label_format username=user_username,
                                  object_resource=objectRef_resource,
                                  object_name=objectRef_name
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "RBAC modification on {{ $labels.object_resource }}/{{ $labels.object_name }}"
              description: "User {{ $labels.username }} modified {{ $labels.object_resource }}/{{ $labels.object_name }}"
          - alert: KubernetesAuditExecAttachPortforward
            expr: |
              sum by (username, object_namespace, subresource) (
                count_over_time(
                  {job="kubernetes/audit"}
                  | json
                  | objectRef_resource = "pods"
                  | objectRef_subresource =~ "exec|attach|portforward"
                  | label_format username=user_username,
                                  object_namespace=objectRef_namespace,
                                  subresource=objectRef_subresource
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "kubectl {{ $labels.subresource }} by {{ $labels.username }}"
              description: "User {{ $labels.username }} used '{{ $labels.subresource }}' on a pod in namespace {{ $labels.object_namespace }}"
          - alert: KubernetesAuditPrivilegedPodCreated
            expr: |
              sum by (username, object_namespace) (
                count_over_time(
                  {job="kubernetes/audit"}
                  | json
                  | objectRef_resource = "pods"
                  | verb = "create"
                  | annotations_pod_security_kubernetes_io_audit_violations != ""
                  | label_format username=user_username,
                                  object_namespace=objectRef_namespace
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Privileged pod created by {{ $labels.username }}"
              description: "User {{ $labels.username }} created a pod with privileged security settings in namespace {{ $labels.object_namespace }}"
          - alert: KubernetesAuditWorkloadCreated
            expr: |
              sum by (username, object_namespace, object_name) (
                count_over_time(
                  {job="kubernetes/audit"}
                  | json
                  | objectRef_resource = "pods"
                  | verb = "create"
                  | user_username != "system:serviceaccount:kube-system:job-controller"
                  | label_format username=user_username,
                                  object_namespace=objectRef_namespace,
                                  object_name=objectRef_name
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: info
            annotations:
              summary: "New pod created by {{ $labels.username }}"
              description: "User {{ $labels.username }} created pod '{{ $labels.object_name }}' in namespace {{ $labels.object_namespace }}"

      - name: vault-audit
        interval: 1m
        rules:
          - alert: VaultRootTokenCreated
            expr: |
              count_over_time(
                {job="vault/audit-log-tailer"}
                | json
                | type = "response"
                | request_path = "sys/generate-root/update"
                | response_data_complete = "true"
                [5m]
              ) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Vault root token was created"
              description: "A root token creation was detected in Vault audit logs"
          - alert: VaultRootTokenUsed
            expr: |
              count_over_time(
                {job="vault/audit-log-tailer"}
                | json
                | type = "request"
                | auth_display_name = "root"
                [5m]
              ) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Vault root token was used"
              description: "A request was made using a root token in Vault"
          - alert: VaultAuthFailureSpike
            expr: |
              sum by (auth_method, auth_path) (
                count_over_time(
                  {job="vault/audit-log-tailer"}
                  | json
                  | type = "response"
                  | request_path =~ "auth/.*"
                  | error =~ "permission denied|invalid credentials"
                  | label_format auth_method=request_mount_type,
                                  auth_path=request_path
                  [5m]
                )
              ) > 5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Vault auth failure spike via {{ $labels.auth_method }}"
              description: "More than 5 {{ $labels.auth_method }} auth failures at '{{ $labels.auth_path }}' in the last 5 minutes"
          - alert: VaultPermissionDeniedSpike
            expr: |
              sum by (denied_path, operation) (
                count_over_time(
                  {job="vault/audit-log-tailer"}
                  | json
                  | type = "response"
                  | request_path !~ "auth/.*"
                  | error = "permission denied"
                  | label_format denied_path=request_path,
                                  operation=request_operation
                  [5m]
                )
              ) > 5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Vault permission denied spike"
              description: "More than 5 permission denied errors for '{{ $labels.operation }}' on '{{ $labels.denied_path }}' in the last 5 minutes"
          - alert: VaultAuditConfigModified
            expr: |
              sum by (actor, audit_device, action) (
                count_over_time(
                  {job="vault/audit-log-tailer"}
                  | json
                  | type = "request"
                  | request_path =~ "sys/audit.*"
                  | request_operation =~ "create|update|delete"
                  | label_format actor=auth_display_name,
                                  audit_device=request_path,
                                  action=request_operation
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: info
            annotations:
              summary: "Vault audit configuration was modified"
              description: "{{ if $labels.actor }}{{ $labels.actor }}{{ else }}unauthenticated{{ end }} performed '{{ $labels.action }}' on '{{ $labels.audit_device }}'"
          - alert: VaultAuthConfigModified
            expr: |
              count_over_time(
                {job="vault/audit-log-tailer"}
                | json
                | type = "request"
                | request_path =~ "sys/auth.*"
                | request_operation =~ "create|update|delete"
                [5m]
              ) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Vault auth configuration was modified"
              description: "A change to Vault's auth configuration was detected"

      - name: log-ingestion-health
        interval: 2m
        rules:
          - alert: LokiAlloyLogsNotReceived
            expr: |
              absent_over_time({cluster="homelab-cluster"}[5m])
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "No logs received from Alloy"
              description: "Loki has not received any logs from Alloy in the last 5 minutes"