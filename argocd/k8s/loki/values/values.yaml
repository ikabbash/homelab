namespaceOverride: monitoring
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 2Gi
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake  # "fake" is the default tenant when auth_enabled: false
      readOnly: true

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  pattern_ingester:
      enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 720h # 30 days
    max_entries_limit_per_query: 5000
    max_global_streams_per_user: 10000
    max_streams_per_user: 0
    reject_old_samples: true
    reject_old_samples_max_age: 168h # 7 days
    creation_grace_period: 10m
    max_line_size: 3MB
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 8MB
    per_stream_rate_limit_burst: 16MB
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  rulerConfig:
    enable_api: true
    alertmanager_url: http://prom-stack-alertmanager.monitoring.svc.cluster.local:9093
    enable_alertmanager_v2: true
    external_labels:
      source: loki
  analytics:
    reporting_enabled: false
  memberlist:
    join_members: []

monitoring:
  serviceMonitor:
    enabled: true
  rules:
    enabled: true
    alerting: true
    labels:
      release: kube-prometheus-stack
  dashboards:
    enabled: false

lokiCanary:
  enabled: true
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0