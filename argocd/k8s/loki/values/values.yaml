namespaceOverride: monitoring
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  pattern_ingester:
      enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 720h # 30 days
    max_entries_limit_per_query: 5000
    max_global_streams_per_user: 10000
    max_streams_per_user: 0
    reject_old_samples: true
    reject_old_samples_max_age: 168h # 7 days
    creation_grace_period: 10m
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  ruler:
    enable_api: true
  analytics:
    reporting_enabled: false
  memberlist:
    join_members: []

lokiCanary:
  enabled: true
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0